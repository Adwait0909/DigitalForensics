{% extends "base.html" %}
{% set current_user = user %}
{% block title %}Edit {{ case.case_number }}{% endblock %}
{% block breadcrumb %}
  <a href="{{ url_for('cases.list_cases') }}">Cases</a>
  <span class="breadcrumb-sep">/</span>
  <a href="{{ url_for('cases.view_case', case_id=case.id) }}">{{ case.case_number }}</a>
  <span class="breadcrumb-sep">/</span><span>Edit</span>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit Case — {{ case.case_number }}</h1>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('cases.edit_case', case_id=case.id) }}">
    <div class="form-group">
      <label class="form-label">Case Title</label>
      <input type="text" name="title" class="form-input" value="{{ case.title }}" required />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-input form-textarea" rows="4">{{ case.description or '' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select name="priority" class="form-input form-select">
          {% for p in ['Critical','High','Medium','Low'] %}
          <option value="{{ p }}" {% if case.priority == p %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select name="status" class="form-input form-select">
          {% for s in ['Active','Pending','Closed','Archived'] %}
          <option value="{{ s }}" {% if case.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Assigned Investigator</label>
        <select name="assigned_to" class="form-input form-select">
          <option value="">— Unassigned —</option>
          {% for inv in investigators %}
          <option value="{{ inv.id }}" {% if case.assigned_to == inv.id %}selected{% endif %}>{{ inv.full_name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Save Changes</button>
      <a href="{{ url_for('cases.view_case', case_id=case.id) }}" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
