{% extends "base.html" %}
{% set current_user = user %}
{% block title %}New Case{% endblock %}
{% block breadcrumb %}
  <a href="{{ url_for('cases.list_cases') }}">Cases</a>
  <span class="breadcrumb-sep">/</span><span>New Case</span>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Create Investigation Case</h1>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('cases.create_case') }}">
    <div class="form-group">
      <label class="form-label">Case Title <span class="required">*</span></label>
      <input type="text" name="title" class="form-input" placeholder="Brief descriptive title" required />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-input form-textarea" rows="4" placeholder="Detailed case description, objectives, scope…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select name="priority" class="form-input form-select">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
          <option value="Critical">Critical</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Assign Investigator</label>
        <select name="assigned_to" class="form-input form-select">
          <option value="">— Unassigned —</option>
          {% for inv in investigators %}
          <option value="{{ inv.id }}">{{ inv.full_name }} ({{ inv.role.name }})</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Create Case</button>
      <a href="{{ url_for('cases.list_cases') }}" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
